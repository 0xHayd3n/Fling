<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fling Desktop</title>
  <style>
    :root {
      --glass-bg: rgba(28, 30, 36, 0.55);
      --glass-bg-strong: rgba(28, 30, 36, 0.78);
      --glass-bg-button: rgba(255, 255, 255, 0.07);
      --glass-bg-button-hover: rgba(255, 255, 255, 0.13);
      --glass-bg-button-active: rgba(255, 255, 255, 0.18);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-border-strong: rgba(255, 255, 255, 0.18);
      --glass-blur: blur(28px) saturate(180%);
      --text-primary: #e7e9ee;
      --text-secondary: #aab0b9;
      --text-tertiary: #6e7480;
      --canvas-bg: #0c0d10;
      --accent: #6c8eff;
      --danger: #f87171;
    }
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
