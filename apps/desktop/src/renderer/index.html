<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fling Desktop</title>
  <style>
    :root {
      --glass-bg: rgba(28, 30, 36, 0.55);
      --glass-bg-strong: rgba(28, 30, 36, 0.78);
      --glass-bg-button: rgba(255, 255, 255, 0.07);
      --glass-bg-button-hover: rgba(255, 255, 255, 0.13);
      --glass-bg-button-active: rgba(255, 255, 255, 0.18);
      --glass-border: rgba(255, 255, 255, 0.10);
      --glass-border-strong: rgba(255, 255, 255, 0.18);
      --glass-blur: blur(28px) saturate(180%);
      /* Liquid Glass — unified recipe used by toolbar, popovers, side controls.
         Layer order in background: top-bright gradient over a dark tint base. */
      --fluid-glass-tint: linear-gradient(180deg,
        rgba(255, 255, 255, 0.14) 0%,
        rgba(255, 255, 255, 0.04) 45%,
        rgba(255, 255, 255, 0.00) 100%);
      --fluid-glass-base: rgba(20, 22, 28, 0.72);
      /* Routes through the inline SVG #liquid-glass filter below — does
         turbulence-based displacement (refraction) + heavy blur + saturate
         in a single pass. Chromium-only; harmless to leave webkit fallback. */
      --fluid-glass-filter: url(#liquid-glass);
      --fluid-glass-inset:
        inset 0 1px 0 rgba(255, 255, 255, 0.26),
        inset 0 0 0 1px rgba(255, 255, 255, 0.08),
        inset 0 -1px 0 rgba(0, 0, 0, 0.20);
      --fluid-glass-lift:
        0 2px 6px rgba(0, 0, 0, 0.22),
        0 8px 22px rgba(0, 0, 0, 0.30);
      --text-primary: #e7e9ee;
      --text-secondary: #aab0b9;
      --text-tertiary: #6e7480;
      --canvas-bg: #0c0d10;
      --accent: #6c8eff;
      --danger: #f87171;
    }
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <!--
    Liquid Glass SVG filter. Referenced from CSS as backdrop-filter:
    url(#liquid-glass). Pipeline:
      1. feTurbulence — generates organic fractal noise.
      2. feGaussianBlur on the noise — softens the noise so displacement
         looks like wave-refraction not pixel-jitter.
      3. feDisplacementMap on the BACKDROP using the soft noise — the
         actual refraction; pixels behind the glass shift up to ±12px.
      4. feGaussianBlur on the displaced backdrop — frosted-glass haze.
      5. feColorMatrix saturate — punch up the colour the way thick glass
         saturates light passing through.
    The filter region is expanded to -20%/140% so the displacement can
    pull pixels from beyond the element's box without showing seams.
  -->
  <svg width="0" height="0" style="position: absolute; visibility: hidden">
    <defs>
      <filter id="liquid-glass" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
        <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="turbulence" />
        <feGaussianBlur in="turbulence" stdDeviation="2" result="turbulence-smooth" />
        <feDisplacementMap in="SourceGraphic" in2="turbulence-smooth" scale="12" xChannelSelector="R" yChannelSelector="G" result="displaced" />
        <feGaussianBlur in="displaced" stdDeviation="20" result="blurred" />
        <feColorMatrix in="blurred" type="saturate" values="1.6" />
      </filter>
    </defs>
  </svg>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
